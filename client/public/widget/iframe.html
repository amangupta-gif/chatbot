<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBot Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      background: transparent;
    }

    /* ── CSS Variables (theme) ── */
    :root {
      --brand: #6366f1;
      --brand-dark: #4f46e5;
      --bg: #0f0f13;
      --bg-2: #17171d;
      --border: rgba(255,255,255,0.07);
      --text: #e4e4e7;
      --text-muted: #71717a;
      --glass-bg: rgba(255,255,255,0.04);
      --user-bubble: var(--brand);
      --user-text: #fff;
      --bot-bubble: var(--glass-bg);
      --bot-text: var(--text);
    }

    html.light {
      --bg: #f8f9fc;
      --bg-2: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #18181b;
      --text-muted: #71717a;
      --glass-bg: rgba(255,255,255,0.85);
      --bot-bubble: #fff;
      --bot-text: #18181b;
    }

    /* ── Layout ── */
    #widget-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .bot-name { font-weight: 600; font-size: 13px; }
    .bot-status { font-size: 11px; color: var(--text-muted); }

    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 28px; height: 28px; border-radius: 8px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

    /* ── Welcome screen ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }

    .welcome-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 16px 40px rgba(99,102,241,0.35);
    }

    .welcome-icon svg { width: 32px; height: 32px; color: white; }
    .welcome-title { font-weight: 700; font-size: 15px; }
    .welcome-msg { font-size: 13px; color: var(--text-muted); line-height: 1.6; max-width: 220px; }

    /* ── Message bubbles ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 3px 16px;
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-bottom: 2px;
    }

    .avatar svg { width: 14px; height: 14px; color: white; }

    .msg-content { display: flex; flex-direction: column; gap: 2px; max-width: 78%; }
    .msg-row.user .msg-content { align-items: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble.bot {
      background: var(--bot-bubble);
      color: var(--bot-text);
      border-radius: 18px 18px 18px 4px;
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
    }

    .bubble.user {
      background: var(--brand);
      color: var(--user-text);
      border-radius: 18px 18px 4px 18px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 2px;
    }

    /* ── Markdown in bot bubble ── */
    .bubble.bot pre {
      background: #0d0d10;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 6px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .bubble.bot code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: rgba(99,102,241,0.15);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .bubble.bot pre code { background: none; padding: 0; }
    .bubble.bot p { margin: 3px 0; }
    .bubble.bot p:first-child { margin-top: 0; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    .bubble.bot ul, .bubble.bot ol { padding-left: 18px; margin: 4px 0; }
    .bubble.bot a { color: #818cf8; }
    .bubble.bot strong { font-weight: 600; }

    /* ── Typing indicator ── */
    #typing {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 4px 16px;
      animation: slideUp 0.2s ease-out;
    }

    #typing.visible { display: flex; }

    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 4px;
    }

    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--brand);
      animation: dotBounce 1.2s infinite ease-in-out;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .typing-label { font-size: 11px; color: var(--text-muted); margin-left: 4px; }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      margin: 4px 16px;
      padding: 10px 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 12px;
      align-items: center;
      gap: 8px;
    }

    #error-banner.visible { display: flex; }
    #error-banner button { margin-left: auto; font-size: 11px; color: #f87171; background: none; border: none; cursor: pointer; text-decoration: underline; }

    /* ── Input area ── */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 10px;
      backdrop-filter: blur(20px);
    }

    #chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      resize: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
    }

    #chat-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 32px; height: 32px; border-radius: 10px;
      background: var(--brand);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; flex-shrink: 0; margin-bottom: 2px;
      transition: all 0.15s;
    }

    #send-btn:hover { background: var(--brand-dark); transform: scale(1.05); }
    #send-btn:disabled { background: #3f3f46; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 14px; height: 14px; }

    .input-hint {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="widget-container">
    <!-- Header -->
    <div id="header">
      <div class="header-left">
        <div class="status-dot"></div>
        <span class="bot-name" id="bot-name">AI Assistant</span>
        <span class="bot-status">Online</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="theme-btn" title="Toggle theme">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <button class="icon-btn" id="clear-btn" title="Clear chat" style="display:none">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages">
      <div id="welcome">
        <div class="welcome-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1 1 .03 2.698-1.379 2.698H4.178c-1.408 0-2.38-1.698-1.379-2.698L4.2 15.3"/>
          </svg>
        </div>
        <div>
          <p class="welcome-title" id="welcome-title">AI Assistant</p>
          <p class="welcome-msg" id="welcome-msg">Hi there! 👋 How can I help you today?</p>
        </div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div id="typing">
      <div class="avatar">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1 1 .03 2.698-1.379 2.698H4.178c-1.408 0-2.38-1.698-1.379-2.698L4.2 15.3"/>
        </svg>
      </div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span class="typing-label">typing</span>
      </div>
    </div>

    <!-- Error banner -->
    <div id="error-banner">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="flex-shrink:0">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      <span id="error-text"></span>
      <button id="retry-btn">Retry</button>
    </div>

    <!-- Input -->
    <div id="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input" placeholder="Ask me anything..." rows="1"></textarea>
        <button id="send-btn" disabled>
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="transform:rotate(90deg)">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2v-9"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter to send · Shift+Enter for newline</p>
    </div>
  </div>

  <script>
    // ── Config from parent ──────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const API_URL = params.get('api') || 'http://localhost:3001';
    const API_KEY = params.get('key') || '';
    const THEME   = params.get('theme') || 'dark';
    const BOT_NAME = decodeURIComponent(params.get('name') || 'AI Assistant');
    const WELCOME  = decodeURIComponent(params.get('welcome') || 'Hi there! 👋 How can I help you today?');

    // ── State ───────────────────────────────────────────────────────────────
    let messages = [];
    let isTyping = false;
    let currentTheme = THEME;

    // ── DOM refs ────────────────────────────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const welcomeEl  = document.getElementById('welcome');
    const typingEl   = document.getElementById('typing');
    const errorEl    = document.getElementById('error-banner');
    const errorText  = document.getElementById('error-text');
    const inputEl    = document.getElementById('chat-input');
    const sendBtn    = document.getElementById('send-btn');
    const clearBtn   = document.getElementById('clear-btn');
    const themeBtn   = document.getElementById('theme-btn');
    const retryBtn   = document.getElementById('retry-btn');

    // ── Init UI ─────────────────────────────────────────────────────────────
    document.getElementById('bot-name').textContent   = BOT_NAME;
    document.getElementById('welcome-title').textContent = BOT_NAME;
    document.getElementById('welcome-msg').textContent   = WELCOME;
    applyTheme(currentTheme);

    // ── Theme ───────────────────────────────────────────────────────────────
    function applyTheme(t) {
      document.documentElement.className = t === 'light' ? 'light' : 'dark';
    }

    themeBtn.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyTheme(currentTheme);
    });

    // ── Helpers ──────────────────────────────────────────────────────────────
    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Very lightweight markdown: code blocks, inline code, bold, links
    function parseMarkdown(text) {
      return text
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/\n/g, '<br>');
    }

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addMessage(msg) {
      welcomeEl.style.display = 'none';
      clearBtn.style.display = 'flex';

      const row = document.createElement('div');
      row.className = `msg-row ${msg.role}`;

      if (msg.role === 'assistant') {
        row.innerHTML = `
          <div class="avatar">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1 1 .03 2.698-1.379 2.698H4.178c-1.408 0-2.38-1.698-1.379-2.698L4.2 15.3"/>
            </svg>
          </div>
          <div class="msg-content">
            <div class="bubble bot">${parseMarkdown(msg.content)}</div>
            ${msg.timestamp ? `<span class="msg-time">${fmtTime(msg.timestamp)}</span>` : ''}
          </div>`;
      } else {
        row.innerHTML = `
          <div class="msg-content">
            <div class="bubble user">${escapeHtml(msg.content).replace(/\n/g,'<br>')}</div>
            ${msg.timestamp ? `<span class="msg-time">${fmtTime(msg.timestamp)}</span>` : ''}
          </div>`;
      }

     messagesEl.appendChild(row);
      scrollBottom();
    }

    function setTyping(on) {
      isTyping = on;
      typingEl.classList.toggle('visible', on);
      sendBtn.disabled = on;
      scrollBottom();
    }

    function showError(msg, show = true) {
      errorText.textContent = msg;
      errorEl.classList.toggle('visible', show);
    }

    // ── Send message ─────────────────────────────────────────────────────────
    async function sendMessage(content) {
      if (!content.trim() || isTyping) return;

      const userMsg = { role: 'user', content: content.trim(), timestamp: new Date().toISOString() };
      messages.push(userMsg);
      addMessage(userMsg);
      showError('', false);
      setTyping(true);

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (API_KEY) headers['x-api-key'] = API_KEY;

        const res = await fetch(`${API_URL}/api/chat/message`, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            messages: messages.slice(-20).map(m => ({ role: m.role, content: m.content })),
          }),
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || `Server error ${res.status}`);
        }

        const data = await res.json();
        const aiMsg = { role: 'assistant', content: data.message.content, timestamp: data.message.timestamp };
        messages.push(aiMsg);
        addMessage(aiMsg);
      } catch (err) {
        showError(err.message || 'Failed to get response.');
      } finally {
        setTyping(false);
      }
    }

    // ── Input handling ───────────────────────────────────────────────────────
    inputEl.addEventListener('input', () => {
      sendBtn.disabled = !inputEl.value.trim() || isTyping;
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const val = inputEl.value;
        inputEl.value = '';
        inputEl.style.height = 'auto';
        sendBtn.disabled = true;
        sendMessage(val);
      }
    });

    sendBtn.addEventListener('click', () => {
      const val = inputEl.value;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      sendMessage(val);
    });

    // ── Clear ────────────────────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      messages = [];
      // Remove all message rows (preserve typing/error els)
      Array.from(messagesEl.querySelectorAll('.msg-row')).forEach(el => el.remove());
      welcomeEl.style.display = 'flex';
      clearBtn.style.display = 'none';
      showError('', false);
    });

    // ── Retry ────────────────────────────────────────────────────────────────
    retryBtn.addEventListener('click', () => {
      showError('', false);
      const lastUser = [...messages].reverse().find(m => m.role === 'user');
      if (lastUser) {
        // Remove last bot message if exists
        if (messages[messages.length - 1]?.role === 'assistant') {
          messages.pop();
          messagesEl.querySelectorAll('.msg-row.assistant:last-of-type')[0]?.remove();
        }
        sendMessage(lastUser.content);
      }
    });
  </script>
</body>
</html>
